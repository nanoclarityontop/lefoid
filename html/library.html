    [data-theme="midnight"]{--bg:#020409;--surface:#0d1117;--surface2:#161b22;--accent:#58a6ff;--accent2:#79c0ff;}
    [data-theme="crimson"]{--bg:#0f0608;--surface:#1a0a0d;--surface2:#230e12;--accent:#f43f5e;--accent2:#fb7185;}
    [data-theme="forest"]{--bg:#050f08;--surface:#0a1f0e;--surface2:#102914;--accent:#22c55e;--accent2:#4ade80;}
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{min-height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;transition:background .4s,color .4s;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;background:rgba(10,10,15,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.25rem;letter-spacing:-.02em;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--accent);}
    .nav-links{display:flex;align-items:center;gap:.5rem;}
    .nav-btn{background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;padding:.4rem .8rem;border-radius:6px;transition:color .2s,background .2s;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
    .nav-btn:hover{color:var(--text);background:var(--surface2);}
    .nav-btn.settings-btn{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
    .nav-btn.settings-btn:hover{border-color:var(--accent);color:var(--accent);}
    main{padding:80px 2rem 4rem;max-width:1400px;margin:0 auto;}
    .page-header{margin-bottom:2rem;}
    .page-title{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;margin-bottom:.4rem;}
    .page-sub{color:var(--muted);font-size:.9rem;}
    .search-wrap{position:relative;margin-bottom:2rem;}
    .search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
    #search{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;padding:.7rem 1rem .7rem 2.5rem;outline:none;transition:border-color .2s;}
    #search:focus{border-color:var(--accent);}
    #search::placeholder{color:var(--muted);}
    .game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;}
    .game-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .25s,box-shadow .25s;position:relative;}
    .game-card:hover{transform:translateY(-4px);border-color:rgba(108,99,255,.45);box-shadow:0 8px 32px rgba(108,99,255,.15);}
    .game-card img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:var(--surface2);}
    .game-card-body{padding:.65rem .75rem;}
    .game-card-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .no-results{text-align:center;color:var(--muted);padding:4rem 2rem;font-size:.9rem;}
    /* MODAL */
    .modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(900px,95vw);height:min(600px,90vh);display:flex;flex-direction:column;overflow:hidden;transform:scale(.95);transition:transform .2s,background .4s;}
    .modal-overlay.open .modal{transform:none;}
    .modal-bar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
    .modal-title{font-weight:600;font-size:.9rem;}
    .modal-actions{display:flex;gap:.4rem;}
    .modal-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:.3rem .65rem;border-radius:6px;cursor:pointer;font-size:.75rem;font-family:'Inter',sans-serif;transition:color .2s,border-color .2s;text-decoration:none;display:inline-flex;align-items:center;}
    .modal-btn:hover{color:var(--text);border-color:var(--accent);}
    .modal-btn.close-modal{color:var(--muted);}
    .modal iframe{flex:1;border:none;width:100%;height:100%;background:#000;}
    /* SETTINGS */
    .settings-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
    .settings-overlay.open{opacity:1;pointer-events:all;}
    .settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(520px,92vw);max-height:85vh;overflow-y:auto;padding:2rem;transform:translateY(20px) scale(.97);transition:transform .25s,background .4s;}
    .settings-overlay.open .settings-panel{transform:none;}
    .settings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;}
    .settings-title{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;}
    .close-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:color .2s,border-color .2s;}
    .close-btn:hover{color:var(--text);border-color:var(--accent);}
    .settings-section{margin-bottom:1.5rem;}
    .settings-label{font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
    .settings-row{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:var(--surface2);border-radius:10px;margin-bottom:.5rem;border:1px solid var(--border);}
    .settings-row-label{font-size:.9rem;font-weight:500;}
    .settings-row-desc{font-size:.75rem;color:var(--muted);margin-top:2px;}
    .settings-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:.875rem;padding:.6rem .9rem;outline:none;transition:border-color .2s;margin-top:.5rem;}
    .settings-input:focus{border-color:var(--accent);}
    .s-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;padding:.6rem .8rem;border-radius:8px;cursor:pointer;transition:border-color .2s,color .2s;}
    .s-btn:hover{border-color:var(--accent);color:var(--accent);}
    .theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;}
    .theme-chip{padding:.55rem .3rem;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;text-align:center;font-size:.75rem;font-weight:500;transition:border-color .2s,color .2s;}
    .theme-chip.active,.theme-chip:hover{border-color:var(--accent);color:var(--accent);}
    .theme-swatch{width:24px;height:24px;border-radius:50%;margin:0 auto 4px;}
    .divider{height:1px;background:var(--border);margin:1.5rem 0;}
    .toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;}
    .toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;cursor:pointer;transition:background .25s;}
    .toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .25s;}
    .toggle input:checked+.toggle-slider{background:var(--accent);}
    .toggle input:checked+.toggle-slider::before{transform:translateX(20px);}
  </style>
</head>

<div class="settings-overlay" id="settings-overlay">

        <div class="theme-chip" data-theme="forest"><div class="theme-swatch" style="background:linear-gradient(135deg,#14532d,#22c55e)"></div>Forest</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="settings-section">
      <div class="settings-label">Tab Cloak</div>
      <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:.5rem;">
        <div><div class="settings-row-label">Custom Tab Title &amp; Icon</div><div class="settings-row-desc">Changes what your browser tab shows</div></div>
        <input class="settings-input" id="tab-title" placeholder="e.g. Google Classroom"/>
        <input class="settings-input" id="tab-icon" placeholder="Icon URL (e.g. https://google.com/favicon.ico)"/>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;width:100%;margin-top:.25rem;">
          <button class="s-btn" id="apply-cloak">Apply Cloak</button>
          <button class="s-btn" id="clear-cloak">Reset</button>
        </div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label">Stealth</div>
      <div class="settings-row">
        <div><div class="settings-row-label">Open in about:blank</div><div class="settings-row-desc">Launches the site in a hidden tab</div></div>
        <button class="s-btn" id="about-blank-btn">Launch</button>
      </div>
    </div>
  </div>
</div>

const grid = document.getElementById('game-grid');
const noRes = document.getElementById('no-results');
const searchEl = document.getElementById('search');

function renderGames(list) {
  grid.innerHTML = '';
  if (!list.length) { noRes.style.display = ''; return; }
  noRes.style.display = 'none';
  list.forEach(g => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `<img src="${g.img}" alt="${g.name}" onerror="this.style.background='var(--surface2)';this.style.height='100px';this.removeAttribute('src')"/>
      <div class="game-card-body"><div class="game-card-name">${g.name}</div></div>`;
    card.addEventListener('click', () => openModal(g));
    grid.appendChild(card);
  });
}
renderGames(GAMES);

searchEl.addEventListener('input', () => {
  const q = searchEl.value.toLowerCase();
  renderGames(q ? GAMES.filter(g => g.name.toLowerCase().includes(q)) : GAMES);
});

// MODAL
const modalOverlay = document.getElementById('modal-overlay');
const modalIframe = document.getElementById('modal-iframe');
const modalTitle = document.getElementById('modal-title');
let currentUrl = '';

function openModal(g) {
  currentUrl = g.url;
  modalTitle.textContent = g.name;
  modalIframe.src = g.url;
  modalOverlay.classList.add('open');
}
function closeModal() {
  modalOverlay.classList.remove('open');
  setTimeout(() => { modalIframe.src = ''; currentUrl = ''; }, 300);
}
document.getElementById('modal-close').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.getElementById('modal-newtab').addEventListener('click', () => { if (currentUrl) window.open(currentUrl, '_blank'); });
document.getElementById('modal-fullscreen').addEventListener('click', () => {
  const m = document.querySelector('.modal');
  if (m.requestFullscreen) m.requestFullscreen();
});

// SETTINGS
const settingsOverlay = document.getElementById('settings-overlay');
document.getElementById('open-settings').addEventListener('click', () => settingsOverlay.classList.add('open'));
document.getElementById('close-settings').addEventListener('click', () => settingsOverlay.classList.remove('open'));
settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('open'); });

document.querySelectorAll('.theme-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.theme-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    const t = chip.dataset.theme;
    document.documentElement.setAttribute('data-theme', t === 'default' ? '' : t);
    localStorage.setItem('lf_theme', t);
  });
});
document.getElementById('apply-cloak').addEventListener('click', () => {
  const ti = document.getElementById('tab-title').value.trim();
  const ic = document.getElementById('tab-icon').value.trim();
  if (ti) { document.title = ti; localStorage.setItem('lf_tab_title', ti); }
  if (ic) { let l = document.querySelector("link[rel='icon']"); if (!l) { l = document.createElement('link'); l.rel = 'icon'; document.head.appendChild(l); } l.href = ic; localStorage.setItem('lf_tab_icon', ic); }
});
document.getElementById('clear-cloak').addEventListener('click', () => {
  document.title = 'Games — Le Foid';
  const l = document.querySelector("link[rel='icon']"); if (l) l.href = '../images/favicon.png';
  localStorage.removeItem('lf_tab_title'); localStorage.removeItem('lf_tab_icon');
  document.getElementById('tab-title').value = ''; document.getElementById('tab-icon').value = '';
});
document.getElementById('about-blank-btn').addEventListener('click', () => {
  const w = window.open('about:blank', '_blank');
  if (!w) return;
  w.document.write('<style>*{margin:0;padding:0;}iframe{border:none;width:100vw;height:100vh;}</style><iframe src="' + location.href + '"></iframe>');
  w.document.close();
});
(function restore() {
  const theme = localStorage.getItem('lf_theme') || 'default';
  if (theme && theme !== 'default') { document.documentElement.setAttribute('data-theme', theme); document.querySelectorAll('.theme-chip').forEach(c => c.classList.toggle('active', c.dataset.theme === theme)); }
  const st = localStorage.getItem('lf_tab_title'); const si = localStorage.getItem('lf_tab_icon');
  if (st) { document.title = st; document.getElementById('tab-title').value = st; }
  if (si) { const l = document.querySelector("link[rel='icon']"); if (l) l.href = si; document.getElementById('tab-icon').value = si; }
})();
</script>
